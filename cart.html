<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eliezer - Cart</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar">
    <div class="logo">Eliezer</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html" class="active">Cart <span id="cartCount" class="cart-count">0</span></a></li>
    </ul>
  </nav>

  <section class="page-header">
    <h1>Your Cart</h1>
    <p>Review your selected items</p>
  </section>

  <section class="cart-section">
    <div id="cartItems" class="cart-items">
      <p class="empty-cart">Your cart is empty! <a href="collections.html">Shop Now</a></p>
    </div>
    <div class="cart-summary" id="cartSummary" style="display:none;">
      <h3>Order Summary</h3>
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="subtotal">₹0</span>
      </div>
      <div class="summary-row">
        <span>Delivery</span>
        <span style="color:green;">FREE</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span id="total">₹0</span>
      </div>
      <div class="customer-form">
        <h4>Your Details</h4>
        <input type="text" id="customerName" placeholder="Your Full Name" required/>
        <input type="tel" id="customerPhone" placeholder="Your Phone Number" required/>
        <input type="text" id="customerAddress" placeholder="Delivery Address" required/>
      </div>
      <button class="checkout-btn" onclick="checkout()">
        📱 Order via WhatsApp
      </button>
      <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
    </div>
  </section>

  <footer>
    <p>© 2025 Eliezer Jewellery. All rights reserved.</p>
  </footer>

  <script>
    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('eliezerCart')) || [];
      const cartItems = document.getElementById('cartItems');
      const cartSummary = document.getElementById('cartSummary');
      const cartCount = document.getElementById('cartCount');

      cartCount.textContent = cart.length;

      if (cart.length === 0) {
        cartItems.innerHTML = '<p class="empty-cart">Your cart is empty! <a href="collections.html">Shop Now</a></p>';
        cartSummary.style.display = 'none';
        return;
      }

      cartSummary.style.display = 'block';
      let total = 0;

      cartItems.innerHTML = cart.map((item, index) => {
        total += item.price * item.quantity;
        return `
          <div class="cart-item">
            <div class="cart-item-img"></div>
            <div class="cart-item-details">
              <h3>${item.name}</h3>
              <p class="price">₹${item.price.toLocaleString()}</p>
              <div class="quantity-controls">
                <button onclick="changeQuantity(${index}, -1)">-</button>
                <span>${item.quantity}</span>
                <button onclick="changeQuantity(${index}, 1)">+</button>
              </div>
            </div>
            <div class="cart-item-total">
              <p>₹${(item.price * item.quantity).toLocaleString()}</p>
              <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('subtotal').textContent = `₹${total.toLocaleString()}`;
      document.getElementById('total').textContent = `₹${total.toLocaleString()}`;
    }

    function changeQuantity(index, change) {
      const cart = JSON.parse(localStorage.getItem('eliezerCart')) || [];
      cart[index].quantity += change;
      if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
      }
      localStorage.setItem('eliezerCart', JSON.stringify(cart));
      loadCart();
    }

    function removeItem(index) {
      const cart = JSON.parse(localStorage.getItem('eliezerCart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('eliezerCart', JSON.stringify(cart));
      loadCart();
    }

    function clearCart() {
      localStorage.removeItem('eliezerCart');
      loadCart();
    }

    function checkout() {
      const cart = JSON.parse(localStorage.getItem('eliezerCart')) || [];

      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }

      const name = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('customerPhone').value.trim();
      const address = document.getElementById('customerAddress').value.trim();

      if (!name || !phone || !address) {
        alert('Please fill in your name, phone number and address!');
        return;
      }

      let message = '🛍️ *New Order from Eliezer Website!*\n\n';
      message += `👤 *Customer Name:* ${name}\n`;
      message += `📞 *Phone:* ${phone}\n`;
      message += `📍 *Address:* ${address}\n\n`;
      message += '*Items Ordered:*\n';

      let total = 0;
      cart.forEach(item => {
        message += `• ${item.name} x${item.quantity} = ₹${(item.price * item.quantity).toLocaleString()}\n`;
        total += item.price * item.quantity;
      });

      message += `\n💰 *Total Amount: ₹${total.toLocaleString()}*\n`;
      message += '\n✅ Please confirm my order. Thank you!';

      // Replace with your WhatsApp number
      const phoneNumber = '918281831092';
      const encodedMessage = encodeURIComponent(message);
      const whatsappURL = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;
      window.open(whatsappURL, '_blank');
    }

    loadCart();
  </script>

</body>
</html>
